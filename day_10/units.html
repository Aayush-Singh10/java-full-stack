<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>units in  html</title>
    <style>
        .p1{
            background-color: red;
             width: 100px;
        }.p2{
            background-color: grey;
              width:40% ;
        }
        .parent{
            border: 1px solid black;
            width: 700px;
        }
    </style>
</head>
<body>
      
    <p class="p1">100px</p>
    <p class="p2">40%</p>

    <div class="parent">
        <p class="p1">100px</p>
    <p class="p2">40%</p>
    </div>
</body>
</html>

<!-- 

-absolute units(fixed units)
       px -pixels
       cm
       mm
       in - inches
       pt - points
       pc - picas

relative units (Responsive units)
       % - percentage
       em
       rem - root em
       vw - viewport width
       vh - viewport height 
->
