    <STYle>
        .navbar{
            display: flex;
            justify-content: flex-end;
            height: 80px;
            border: 1px solid black;
            background-color: black;
            align-items: center;
            position: sticky;
            top: 0;

        }
        a{
            color: antiquewhite;
            font-size: 30px;
            text-decoration: none;
            margin: 10px;
            
        }
        a:hover{
            text-decoration: underline;
            color: grey;
        }
        img{
            height: 60px;
            border-radius: 50px;
        }
        .profile{
            margin-right: auto;
            padding: 20px 20px;
        }
    </STYle>
