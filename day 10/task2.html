<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive web page desigh task 2</title>
    <style>
        .box{
            height: 400px;
            width: 400px;
            background-color: red;
        }
        /* 500px-900px */
        @media screen and (min-width: 500px) and (max-width:900px) ;
            
        {
            .box{
                border-radius: 50%;
            }
        }
        @media screen and (max-width:500px) {
            .box{
                border-radius: 50%;
                background: linear-gradient(to right ,red,green)
                ;
            }
            
        }
        @media screen (orientation: portrait){

            .box{
                height:200px;
                width: 200px;
                background: linear-gradient(to left , yellow, blue );
            }
        }
        @media screen  and {
            
        }
            
        
        /* orientation : potrait(width<height) 
                    :    landscape(width>height)*/
    </style>
</head>
<body>
    
    <div class="box"></div>
</body>
</html>
