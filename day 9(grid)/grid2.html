<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid 2 example</title>
    <style>
        .Grid-container{
    display: grid;
    grid-template-columns: repeat(5,100px);
    grid-template-rows: repeat(5,100px);
   
    

}
.grid-item{
    border: 1px solid black;
    font-size: 40px;

}
.one{
    background-color: aqua;
    grid-column-start:1 ;
    grid-column-end:3 ;
}
.two{
    background-color: green;
    /* grid-column-start: 3;
    grid-column-end: 6; */
/* upar wale k jgh pr hm ye niche wala v likh skte h */
    grid-column: 3/6;
}
.three{
    background-color: antiquewhite;
    grid-row: 2/6;
}
.four{
    background-color: yellow;
    grid-area: 2/2/5/5;
}
.five{
    background-color: rgb(240, 3, 43);
    grid-row: 2/5;
}
.six{
    background-color: violet;
grid-column: 2/6;
}
    </style>
</head>
<body>
    <div class="Grid-container">

    <div class="grid-item one">1</div>
    <div class="grid-item two">2</div>
    <div class="grid-item three">3</div>
    <div class="grid-item four">4</div>
    <div class="grid-item five">5</div>
    <div class="grid-item six">6</div>

</div>
    
</body>
</html>
