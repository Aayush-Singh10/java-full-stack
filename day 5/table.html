<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        table,th,td{
            border: 1px solid black;
             border-collapse: collapse ;
        }
    </style>
</head>
<body>
    <table border="1" >
        <table>
        <thead>
        <tr> 
<th>Sname</th>
<th>name</th>
<th>phone</th>
        </tr>
        </thead>
        <tbody>
<tr>
    <td>1</td>
    <td>ayush</td>
    <td>3467</td>
</tr>
<tr>
    <td>2</td>
    <td>yuvraj</td>
    <td>678</td>
</tr>
        </tbody>

    </table>
    
</body>
</html>

<!-- table ------for table structure
 thead ------for table head
 tbody------ for table data/body
 tr-----for table row
 th------for table header cell(bold & centered)
td------ for table data(normal)
cellspacing == space between cell to cell
cellpadding== space between content and border  
-->
