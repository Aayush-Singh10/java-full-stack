<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>color</title>
    <style>
        div{
            height: 100px;
            width: 200px;
            background-color: 1px solid rgb(0, 0, 0);
            background-color: red;
            background-color: green;
        }
        /* 
          color   -   names
                  -     rgb(red, green, blue)  
                  -   rgba (red, green, blue, alpha(opacity))----->transparent(0-1)      
                      0  = fully transparent
                      1   = not transparent
                  - hex(hexadecimal)=== #rrggbb
                  - hsl(hue, saturation, lightness)

                  */
    </style>
</head>
<body>
    <div></div>
</body>
</html>
