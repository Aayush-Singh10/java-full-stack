<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>block and inline</title>
    <style>
        div{
            border: 2px solid red;
            height: 70px;
            width: 50px;
            padding: 10px;
        }
        span{
            border: 2px solid black;
            height: 70px;
            width: 50px;
            padding: 10px;
            display: block;
        }
        b{
            border: 1px solid black;
            height: 60px;
            width: 50px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div>block level element</div>
    <span>inline element</span>
    <hr>
    <b>Lorem ipsum dolor sit amet consectetur adipisicing elit. Tempora sint nam velit fugit a! Temporibus, laboriosam sunt! Laborum odit mollitia dolore assumenda dicta harum est eaque, pariatur, suscipit asperiores quidem.</b>
</body>
</html>
